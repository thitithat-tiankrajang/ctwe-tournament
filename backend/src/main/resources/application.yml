spring:
  application:
    name: tournament-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tournament}
    username: ${DATABASE_USER:tournament_app}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 5000
      max-lifetime: 1200000
      keepalive-time: 120000
      idle-timeout: 300000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
  lifecycle:
    timeout-per-shutdown-phase: 25s
server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:50}
      min-spare: 5
    accept-count: 100
    # Every open SSE stream holds one connection. Load tests raise this together with
    # LOAD_TEST_MODE/MAX_SSE_CONNECTIONS; production keeps the 2000 default.
    max-connections: ${TOMCAT_MAX_CONNECTIONS:2000}
    # Publish tomcat.threads.* / tomcat.connections.* Micrometer metrics for the load-test monitor.
    mbeanregistry:
      enabled: true
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: strict
  error:
    include-message: never
    include-stacktrace: never
security:
  staff:
    username: ${STAFF_USERNAME}
    password-hash: ${STAFF_PASSWORD_HASH}
app:
  dev-tools-enabled: ${DEV_TOOLS_ENABLED:false}
  # Load-testing escape hatch (see load-testing/README.md). With LOAD_TEST_MODE=true the public
  # SSE cap (and its 1500 ceiling) is replaced by MAX_SSE_CONNECTIONS so capacity tests can push
  # the connector to its real limit. Never enable on a deployment serving a real event.
  load-test:
    enabled: ${LOAD_TEST_MODE:false}
    max-sse-connections: ${MAX_SSE_CONNECTIONS:10000}
  realtime:
    # Hard ceiling for the admin-tunable public SSE cap. Raise together with the Render instance
    # (and TOMCAT_MAX_CONNECTIONS) on high-traffic days; the everyday default protects Starter.
    max-public-sse-ceiling: ${MAX_PUBLIC_SSE_CEILING:1500}
  security:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:https://ctwe-tournament.ctwe.workers.dev,https://ct-we.com,http://192.168.1.36:3000}"
  # SSE caps, heartbeat, polling interval and reconnect delay moved to the runtime_settings table
  # (admin page > Realtime) so they apply without a redeploy. See RuntimeSettingsService.
  push:
    # Generate once and keep stable. Rotating VAPID keys invalidates existing browser subscriptions.
    vapid-public-key: ${VAPID_PUBLIC_KEY:}
    vapid-private-key: ${VAPID_PRIVATE_KEY:}
    vapid-subject: ${VAPID_SUBJECT:}
    # Comma-separated suffix override; defaults cover Chrome/Firefox/Safari/Edge push services.
    allowed-host-suffixes: ${WEB_PUSH_ALLOWED_HOST_SUFFIXES:}
  cache:
    public-card-details:
      ttl-seconds: ${PUBLIC_CARD_CACHE_TTL_SECONDS:300}
      maximum-size: ${PUBLIC_CARD_CACHE_MAX_SIZE:8}
    public-card-catalog:
      ttl-seconds: ${PUBLIC_CARD_CATALOG_CACHE_TTL_SECONDS:300}
    public-card-versions:
      ttl-seconds: ${PUBLIC_CARD_VERSIONS_CACHE_TTL_SECONDS:3}
    runtime-settings:
      ttl-seconds: ${RUNTIME_SETTINGS_CACHE_TTL_SECONDS:5}
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,caches
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    distribution:
      # Server-side latency percentiles for the load-test report (client percentiles are also
      # measured by the harness; these expose the origin's own view at /actuator/metrics).
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
