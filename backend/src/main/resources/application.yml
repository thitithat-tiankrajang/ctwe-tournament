spring:
  application:
    name: tournament-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tournament}
    username: ${DATABASE_USER:tournament_app}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 5000
      max-lifetime: 1200000
      keepalive-time: 120000
      idle-timeout: 300000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
  lifecycle:
    timeout-per-shutdown-phase: 25s
server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:50}
      min-spare: 5
    accept-count: 100
    max-connections: 2000
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: strict
  error:
    include-message: never
    include-stacktrace: never
security:
  staff:
    username: ${STAFF_USERNAME}
    password-hash: ${STAFF_PASSWORD_HASH}
app:
  dev-tools-enabled: ${DEV_TOOLS_ENABLED:false}
  # Every live SSE stream holds a Tomcat connection (max-connections: 2000). Caps keep streams well
  # under half the connector so mutations always have headroom; over-cap clients fall back to polling.
  sse:
    max-staff-streams: ${SSE_MAX_STAFF_STREAMS:300}
    max-public-streams: ${SSE_MAX_PUBLIC_STREAMS:600}
  cache:
    public-card-details:
      ttl-seconds: ${PUBLIC_CARD_CACHE_TTL_SECONDS:300}
      maximum-size: ${PUBLIC_CARD_CACHE_MAX_SIZE:8}
    public-card-catalog:
      ttl-seconds: ${PUBLIC_CARD_CATALOG_CACHE_TTL_SECONDS:300}
    public-card-versions:
      ttl-seconds: ${PUBLIC_CARD_VERSIONS_CACHE_TTL_SECONDS:3}
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,caches
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
