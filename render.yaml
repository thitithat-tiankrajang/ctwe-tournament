services:
  - type: web
    name: ctwe-tournament-api
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health/readiness
    maxShutdownDelaySeconds: 30
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: STAFF_USERNAME
        sync: false
      - key: STAFF_PASSWORD_HASH
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: PORT
        value: "10000"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: DEV_TOOLS_ENABLED
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ctwe-tournament.ctwe.workers.dev,https://ct-we.com,http://192.168.1.36:3000"
      - key: DB_POOL_MAX_SIZE
        value: "5"
      - key: DB_POOL_MIN_IDLE
        value: "0"
      - key: PUBLIC_CARD_CACHE_TTL_SECONDS
        value: "300"
      - key: PUBLIC_CARD_CACHE_MAX_SIZE
        value: "8"
      - key: PUBLIC_CARD_CATALOG_CACHE_TTL_SECONDS
        value: "300"
      - key: PUBLIC_CARD_VERSIONS_CACHE_TTL_SECONDS
        value: "3"
